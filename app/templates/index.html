<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikibot IA Corporativa</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        #chat {
            height: 400px;
            border: 1px solid #ccc;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }

        .mensagem {
            margin-bottom: 10px;
        }

        .usuario {
            color: blue;
        }

        .bot {
            color: green;
        }

        .input-area {
            display: flex;
        }

        input {
            flex: 1;
            padding: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Wikibot IA Corporativa</h1>

    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="pergunta" placeholder="Digite sua pergunta...">
        <button onclick="enviarMensagem()">Enviar</button>
    </div>

</div>

<script>

    async function enviarMensagem() {
    
        const input = document.getElementById("pergunta");
        const chat = document.getElementById("chat");
    
        const pergunta = input.value;
    
        if (pergunta.trim() === "") {
            return;
        }
    
        chat.innerHTML += `
            <div class="mensagem usuario">
                <strong>Você:</strong> ${pergunta}
            </div>
        `;
    
        input.value = "";
    
        const resposta = await fetch("/chat", {
    
            method: "POST",
    
            headers: {
                "Content-Type": "application/json"
            },
    
            body: JSON.stringify({
                pergunta: pergunta
            })
    
        });
    
        const dados = await resposta.json();
    
        chat.innerHTML += `
            <div class="mensagem bot">
                <strong>Wikibot:</strong> ${dados.resposta}
            </div>
        `;
    
    }
    
    </script>

</body>
</html>
